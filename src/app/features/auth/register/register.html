<div class="register-wrapper">

  <!-- Header -->
  <div class="auth-header">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join ShopNow and start shopping</p>
  </div>

  <!-- Role selector -->
  <div class="role-selector">
    <button type="button" class="role-btn"
      [class.role-active]="role === 'Customer'"
      (click)="role = 'Customer'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Customer
    </button>
    <button type="button" class="role-btn"
      [class.role-active]="role === 'Seller'"
      (click)="role = 'Seller'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Seller
    </button>
  </div>

  <!-- Form -->
  <form (ngSubmit)="onSubmit()" class="auth-form">

    <!-- Name -->
    <div class="field-group">
      <label class="field-label">Full name</label>
      <div class="field-input-wrap">
        <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" [(ngModel)]="name" name="name"
          placeholder="Ahmed Hassan"
          class="field-input" required/>
      </div>
    </div>

    <!-- Email -->
    <div class="field-group">
      <label class="field-label">Email address</label>
      <div class="field-input-wrap">
        <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input type="email" [(ngModel)]="email" name="email"
          placeholder="your@email.com"
          class="field-input" required/>
      </div>
    </div>

    <!-- Phone -->
    <div class="field-group">
      <label class="field-label">Phone number</label>
      <div class="field-input-wrap">
        <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07
            19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1
            4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0
            1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1
            2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <input type="tel" [(ngModel)]="phone" name="phone"
          placeholder="+20 100 000 0000"
          class="field-input"/>
      </div>
    </div>

    <!-- Password -->
    <div class="field-group">
      <label class="field-label">Password</label>
      <div class="field-input-wrap">
        <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password" name="password"
          placeholder="••••••••"
          class="field-input" required/>
        <button type="button" class="toggle-pw" (click)="togglePassword()">
          @if (showPassword) {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <line x1="1" y1="1" x2="23" y2="23"/>
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
                a18.5 18.5 0 0 1-2.16 3.19"/>
            </svg>
          } @else {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="field-group">
      <label class="field-label">Confirm password</label>
      <div class="field-input-wrap">
        <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input [type]="showConfirmPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword" name="confirmPassword"
          placeholder="••••••••"
          class="field-input" required/>
        <button type="button" class="toggle-pw" (click)="toggleConfirmPassword()">
          @if (showConfirmPassword) {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <line x1="1" y1="1" x2="23" y2="23"/>
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
                a18.5 18.5 0 0 1-2.16 3.19"/>
            </svg>
          } @else {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" class="submit-btn" [class.loading]="isLoading">
      @if (isLoading) {
        <span class="spinner"></span>
        Creating account...
      } @else {
        Create account
      }
    </button>

    <!-- Divider -->
    <div class="divider"><span>or continue with</span></div>

    <!-- Social -->
    <div class="social-btns">
      <button type="button" class="social-login-btn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92
            c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77
            c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84
            C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43
            .35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15
            C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84
            c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
      <button type="button" class="social-login-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12
            c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43
            c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953
            H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47
            h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Facebook
      </button>
    </div>

  </form>

  <!-- Footer -->
  <p class="auth-footer">
    Already have an account?
    <a routerLink="/auth/login" class="auth-link">Sign in</a>
  </p>

</div>
